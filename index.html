<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ethan the Jumper</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#11142a;color:#fff;font-family:system-ui,sans-serif}
.s{max-width:980px;margin:0 auto;padding:20px 16px}
h1{font-size:clamp(1.8rem,5vw,3.5rem);letter-spacing:-.04em;margin-bottom:10px}
.g{border:1px solid rgba(255,255,255,.15);border-radius:18px;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:auto}
.m{display:grid;grid-template-columns:70px 70px 1fr;gap:8px;margin-top:10px}
.m button{height:50px;border:0;border-radius:14px;font-weight:900;font-size:1rem;cursor:pointer;touch-action:none;background:#ffba45;color:#111}
.m .j{background:#7e81ff;color:#fff}
p{color:#aaa;font-size:.85rem;margin-bottom:8px}
</style>
</head>
<body>
<main class="s">
<h1>Ethan the Jumper</h1>
<p>A/D or Arrows = move | Space/W = jump | R = restart</p>
<div class="g"><canvas id="c" width="960" height="540"></canvas></div>
<div class="m">
<button id="bl">&#9664;</button>
<button id="br">&#9654;</button>
<button id="bj" class="j">Jump</button>
</div>
</main>
<script>
(()=>{
const v=document.getElementById("c"),q=v.getContext("2d"),W=960,H=540,T=64,G=1800,MX=300,AC=2600,JV=-680;
const WW=T*80,GR=10,CO=Math.ceil(WW/T),RO=12;
const k={},ms={l:0,r:0,j:0};
window.onkeydown=e=>{k[e.code]=1;if(["Space","ArrowUp","ArrowDown"].includes(e.code))e.preventDefault()};
window.onkeyup=e=>{k[e.code]=0};
["bl","br","bj"].forEach((id,i)=>{const b=document.getElementById(id);if(!b)return;const f=["l","r","j"][i];b.onpointerdown=()=>ms[f]=1;b.onpointerup=()=>ms[f]=0;b.onpointerleave=()=>ms[f]=0});
const iL=()=>k.KeyA||k.ArrowLeft||ms.l,iR=()=>k.KeyD||k.ArrowRight||ms.r,iJ=()=>k.Space||k.KeyW||k.ArrowUp||ms.j;
const mp=[];
for(let r=0;r<RO;r++){mp[r]=[];for(let c=0;c<CO;c++)mp[r][c]=0}
for(let c=0;c<CO;c++){if((c>=18&&c<=19)||(c>=38&&c<=40)||(c>=58&&c<=59))continue;mp[GR][c]=1;if(GR+1<RO)mp[GR+1][c]=1}
[[4,8,3],[9,7,2],[14,6,4],[22,7,3],[27,5,3],[32,8,2],[36,6,3],[42,7,4],[48,5,2],[52,8,3],[55,6,2],[60,7,3],[65,5,4],[70,8,2],[74,6,3],[78,7,2]].forEach(([c,r,w])=>{for(let i=0;i<w;i++)if(r<RO&&c+i<CO)mp[r][c+i]=1});
const SD=[[5,7],[11,6],[16,5],[23,6],[28,4],[34,7],[37,5],[44,6],[49,4],[53,7],[56,5],[61,6],[66,4],[71,7],[75,5],[79,4]];
let st=[],en=[];
const rS=()=>{st=SD.map(([c,r])=>({x:c*T+32,y:r*T-18,a:1,b:Math.random()*6.28}))};
const ED=[{c:15,n:3},{c:25,n:2},{c:43,n:3},{c:63,n:2},{c:77,n:2}];
const rE=()=>{en=ED.map(e=>({x:e.c*T,y:GR*T-38,w:44,h:34,sx:e.c*T,rn:e.n*T,d:1,a:1,f:0}))};
const pt={x:78*T,y:GR*T-100};
const P={x:2*T,y:GR*T-80,vx:0,vy:0,w:32,h:52,og:0,ct:0,jb:0,wj:0,fc:1,sc:0,lv:3,dd:0,wf:0};
let gt=0,gs="p",dt2=0,wt=0,cm=0,cmY=0;
const bg=[];for(let i=0;i<60;i++)bg.push({x:Math.random()*WW,y:Math.random()*RO*T,s:Math.random()*2+1,b:Math.random()});
function res(){P.x=2*T;P.y=GR*T-80;P.vx=0;P.vy=0;P.og=0;P.ct=0;P.jb=0;P.wj=0;P.fc=1;P.sc=0;P.lv=3;P.dd=0;P.wf=0;gs="p";gt=0;cm=0;cmY=0;rS();rE()}
res();
function sol(x,y,w,h){const l=Math.floor(x/T),r=Math.floor((x+w-1)/T),t=Math.floor(y/T),b=Math.floor((y+h-1)/T);for(let rr=t;rr<=b;rr++)for(let cc=l;cc<=r;cc++){if(rr<0||rr>=RO||cc<0||cc>=CO)continue;if(mp[rr][cc])return true}return false}
function upd(dt){
if(gs==="d"){dt2+=dt;if(dt2>2){dt2=0;P.lv--;if(P.lv<=0){gs="o"}else{P.x=2*T;P.y=GR*T-80;P.vx=0;P.vy=0;P.og=0;P.dd=0;gs="p"}}return}
if(gs==="w"){wt+=dt;return}
if(gs==="o")return;
gt+=dt;
let ax=0;
if(iL())ax=-AC;
if(iR())ax=AC;
if(ax===0){const fr=P.og?2600:800;if(P.vx>0)P.vx=Math.max(0,P.vx-fr*dt);else P.vx=Math.min(0,P.vx+fr*dt)}else{P.vx+=ax*dt;if(P.vx>MX)P.vx=MX;if(P.vx<-MX)P.vx=-MX}
P.vy+=G*dt;if(P.vy>900)P.vy=900;
let nx=P.x+P.vx*dt;
if(sol(nx,P.y,P.w,P.h)){if(P.vx>0){nx=Math.floor((nx+P.w-1)/T)*T-P.w}else{nx=Math.floor(P.x/T)*T}P.vx=0}
P.x=nx;if(P.x<0)P.x=0;if(P.x>WW-P.w)P.x=WW-P.w;
let ny=P.y+P.vy*dt;
if(P.vy>=0&&sol(P.x,ny,P.w,P.h)){ny=Math.floor((ny+P.h-1)/T)*T-P.h;P.vy=0;P.og=1;P.ct=0.1}else if(P.vy<0&&sol(P.x,ny,P.w,P.h)){ny=Math.floor(ny/T)*T+T;P.vy=0}else{P.og=0}
P.y=ny;
if(P.ct>0)P.ct-=dt;
if(iJ()){P.jb=0.12}
if(P.jb>0){P.jb-=dt;if(P.ct>0||P.og){P.vy=JV;P.og=0;P.ct=0;P.jb=0;P.wj=0}}
if(!iJ()&&P.vy<0){P.vy*=0.5}
if(P.y>RO*T+100){P.dd=1;gs="d";dt2=0;return}
P.fc=iR()?1:(iL()?-1:P.fc);
const tgt=P.x+P.w/2-W/2;cm+=(tgt-cm)*0.1;if(cm<0)cm=0;if(cm>WW-W)cm=WW-W;
const tgtY=P.y+P.h/2-H/2+40;cmY+=(tgtY-cmY)*0.1;if(cmY<0)cmY=0;if(cmY>RO*T-H)cmY=RO*T-H;
st.forEach(s=>{if(!s.a)return;const dx=P.x+P.w/2-s.x,dy=P.y+P.h/2-s.y;if(dx*dx+dy*dy<900){s.a=0;P.sc++;P.wf+=100}});
en.forEach(e=>{if(!e.a)return;e.f+=dt*3;e.x+=e.d*60*dt;if(e.d>0&&e.x>e.sx+e.rn){e.d=-1}else if(e.d<0&&e.x<e.sx){e.d=1}
const px=P.x,py=P.y;if(px<e.x+e.w&&px+P.w>e.x&&py<e.y+e.h&&py+P.h>e.y){if(P.vy>0&&py+P.h-e.y<20){e.a=0;P.vy=JV*0.6;P.wf+=200}else{P.dd=1;gs="d";dt2=0}}});
if(Math.abs(P.x+P.w/2-pt.x-30)<40&&Math.abs(P.y+P.h/2-pt.y-50)<60){gs="w";wt=0}
}
function dr(){
q.fillStyle="#1a1040";q.fillRect(0,0,W,H);
q.save();q.translate(-cm,-cmY);
bg.forEach(s=>{const a=0.4+0.6*((Math.sin(gt*2+s.b)+1)/2);q.globalAlpha=a;q.fillStyle="#fff";q.beginPath();q.arc(s.x,s.y,s.s,0,6.28);q.fill()});
q.globalAlpha=1;
const sc=Math.floor(cm/T),ec=Math.min(sc+Math.ceil(W/T)+2,CO);
for(let r=0;r<RO;r++)for(let c=sc;c<ec;c++){if(!mp[r][c])continue;const x=c*T,y=r*T;if(r===GR){q.fillStyle="#5b8c5a";q.fillRect(x,y,T,T);q.fillStyle="#4a7a49";q.fillRect(x,y,T,4)}else if(r>GR){q.fillStyle="#3d2b1f";q.fillRect(x,y,T,T)}else{q.fillStyle="#6ec6ff";q.fillRect(x,y,T,T);q.fillStyle="#5ab8f5";q.fillRect(x,y+T-4,T,4)}}
st.forEach(s=>{if(!s.a)return;const by=Math.sin(gt*3+s.b)*6;q.save();q.translate(s.x,s.y+by);q.fillStyle="#ffd700";q.beginPath();const sp=5,or=14,ir=6;for(let i=0;i<sp*2;i++){const a=Math.PI/2+Math.PI*i/sp;const rad=i%2===0?or:ir;q.lineTo(Math.cos(a)*rad,Math.sin(a)*-rad)}q.closePath();q.fill();q.restore()});
en.forEach(e=>{if(!e.a)return;q.fillStyle="#4caf50";q.fillRect(e.x+4,e.y+8,e.w-8,e.h-8);q.beginPath();q.arc(e.x+e.w/2,e.y+10,16,Math.PI,0);q.fill();q.fillStyle="#fff";const ex=e.d>0?6:-6;q.fillRect(e.x+e.w/2-8+ex,e.y+10,5,5);q.fillRect(e.x+e.w/2+3+ex,e.y+10,5,5);q.fillStyle="#333";q.fillRect(e.x+e.w/2-7+ex,e.y+11,3,3);q.fillRect(e.x+e.w/2+4+ex,e.y+11,3,3)});
const px=P.x,py=P.y,pw=P.w,ph=P.h;
if(gs!=="d"){
q.save();q.translate(px+pw/2,py+ph);q.scale(P.fc,1);
q.fillStyle="#4169e1";q.fillRect(-pw/2,-(ph),pw,ph*0.55);
q.fillStyle="#1a3a8a";q.fillRect(-pw/2,-ph*0.45,pw/2-1,ph*0.45);q.fillRect(1,-ph*0.45,pw/2-1,ph*0.45);
q.fillStyle="#ffcc99";q.beginPath();q.arc(0,-ph+2,pw/2+2,Math.PI,0);q.arc(0,-ph-8,pw/2-2,0,Math.PI*2);q.fill();
q.fillStyle="#3b2314";q.beginPath();q.ellipse(0,-ph-6,pw/2+4,10,0,Math.PI,Math.PI*2);q.fill();q.fillRect(-pw/2-2,-ph-4,4,8);q.fillRect(pw/2-2,-ph-4,4,8);
q.fillStyle="#fff";q.fillRect(-6,-ph-2,5,5);q.fillRect(2,-ph-2,5,5);
q.fillStyle="#333";q.fillRect(-5,-ph-1,3,3);q.fillRect(3,-ph-1,3,3);
q.fillStyle="#e07050";q.fillRect(-3,-ph+6,6,2);
q.restore()}
q.save();q.translate(pt.x,pt.y);const pg=gt*2;q.strokeStyle="hsl("+(pg*60%360)+",80%,60%)";q.lineWidth=3;q.strokeRect(4,4,52,92);q.fillStyle="hsla("+(pg*60%360)+",80%,60%,0.15)";q.fillRect(4,4,52,92);q.fillStyle="#fff";q.font="bold 14px system-ui";q.textAlign="center";q.fillText("EXIT",30,55);q.restore();
q.restore();
q.fillStyle="rgba(0,0,0,0.5)";q.fillRect(0,0,W,36);
q.fillStyle="#ffd700";q.font="bold 18px system-ui";q.textAlign="left";
q.fillText("\u2605"+P.wf,10,26);
for(let i=0;i<3;i++){q.fillStyle=i<P.lv?"#ff4444":"#444";q.fillText("\u2764",90+i*24,26)}
q.textAlign="right";q.fillStyle="#fff";q.fillText("Stars: "+P.sc+"/"+st.length,W-10,26);
if(gs==="p"&&gt<2){q.globalAlpha=Math.max(0,1-gt/2);q.fillStyle="#fff";q.font="bold 28px system-ui";q.textAlign="center";q.fillText("GO!",W/2,H/2);q.globalAlpha=1}
if(gs==="o"){q.fillStyle="rgba(0,0,0,0.7)";q.fillRect(0,0,W,H);q.fillStyle="#ff4444";q.font="bold 42px system-ui";q.textAlign="center";q.fillText("GAME OVER",W/2,H/2-20);q.fillStyle="#fff";q.font="20px system-ui";q.fillText("Score: "+P.wf+" | Press R to restart",W/2,H/2+30)}
if(gs==="w"){q.fillStyle="rgba(0,0,0,0.7)";q.fillRect(0,0,W,H);q.fillStyle="#4cff88";q.font="bold 42px system-ui";q.textAlign="center";q.fillText("YOU WIN!",W/2,H/2-20);q.fillStyle="#fff";q.font="20px system-ui";q.fillText("Score: "+P.wf+" | Stars: "+P.sc+"/"+st.length,W/2,H/2+30)}
}
let lt=0;
function loop(t){const dt=Math.min((t-lt)/1000,0.05);lt=t;if(k.KeyR){res()}upd(dt);dr();requestAnimationFrame(loop)}
requestAnimationFrame(t=>{lt=t;loop(t)});
})();
</script>
</body>
</html>
