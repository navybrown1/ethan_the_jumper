<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ethan the Jumper</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#11142a;color:#fff;font-family:system-ui,sans-serif}
.s{max-width:980px;margin:0 auto;padding:20px 16px}
h1{font-size:clamp(1.8rem,5vw,3.5rem);letter-spacing:-.04em;margin-bottom:10px}
.g{border:1px solid rgba(255,255,255,.15);border-radius:18px;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:auto}
.m{display:grid;grid-template-columns:70px 70px 1fr;gap:8px;margin-top:10px}
.m button{height:50px;border:0;border-radius:14px;font-weight:900;font-size:1rem;cursor:pointer;touch-action:none;background:#ffba45;color:#111}
.m .j{background:#7e81ff;color:#fff}
p{color:#aaa;font-size:.85rem;margin-bottom:8px}
</style>
</head>
<body>
<main class="s">
<h1>Ethan the Jumper</h1>
<p>A/D or Arrows = move | Space/W = jump | R = restart</p>
<div class="g"><canvas id="c" width="960" height="540"></canvas></div>
<div class="m">
<button id="bl">&#9664;</button>
<button id="br">&#9654;</button>
<button id="bj" class="j">Jump</button>
</div>
</main>
<script>
(()=>{
const v=document.getElementById("c"),q=v.getContext("2d"),W=960,H=540,T=64,G=1800,MX=300,AC=2600,JV=-680;
const WW=T*80,GR=10,CO=Math.ceil(WW/T),RO=12;
const k={},ms={l:0,r:0,j:0};
window.onkeydown=e=>{k[e.code]=1;if(["Space","ArrowUp","ArrowDown"].includes(e.code))e.preventDefault()};
window.onkeyup=e=>{k[e.code]=0};
["bl","br","bj"].forEach((id,i)=>{const b=document.getElementById(id);if(!b)return;const f=["l","r","j"][i];b.onpointerdown=()=>ms[f]=1;b.onpointerup=()=>ms[f]=0;b.onpointerleave=()=>ms[f]=0});
const iL=()=>k.KeyA||k.ArrowLeft||ms.l,iR=()=>k.KeyD||k.ArrowRight||ms.r,iJ=()=>k.Space||k.KeyW||k.ArrowUp||ms.j;
const mp=[];
for(let r=0;r<RO;r++){mp[r]=[];for(let c=0;c<CO;c++)mp[r][c]=0}
for(let c=0;c<CO;c++){if((c>=18&&c<=19)||(c>=38&&c<=40)||(c>=58&&c<=59))continue;mp[GR][c]=1;if(GR+1<RO)mp[GR+1][c]=1}
[[4,8,3],[9,7,2],[14,6,4],[22,7,3],[27,5,3],[32,8,2],[36,6,3],[42,7,4],[48,5,2],[52,8,3],[55,6,2],[60,7,3],[65,5,4],[70,8,2],[74,6,3],[78,7,2]].forEach(([c,r,w])=>{for(let i=0;i<w;i++)if(c+i<CO)mp[r][c+i]=2});
const SD=[[5,7],[11,6],[16,5],[23,6],[28,4],[34,7],[37,5],[44,6],[49,4],[53,7],[56,5],[61,6],[66,4],[71,7],[75,5],[79,4]];
let st=[],en=[];
const rS=()=>{st=SD.map(([c,r])=>({x:c*T+32,y:r*T-18,a:1,b:Math.random()*6.28}))};
const ED=[{c:15,n:3},{c:25,n:2},{c:43,n:3},{c:63,n:2},{c:77,n:2}];
const rE=()=>{en=ED.map(e=>({x:e.c*T,y:GR*T-38,w:44,h:34,sx:e.c*T,rn:e.n*T,d:1,a:1,f:0}))};
const pt={x:78*T,y:GR*T-100};
const P={x:2*T,y:GR*T-80,vx:0,vy:0,w:32,h:52,og:0,ct:0,jb:0,wj:0,fc:1,sc:0,lv:3,dd:0,wf:0};
let gt=0,gs="p",dt2=0,wt=0,cm=0;
function rP(f){P.x=2*T;P.y=GR*T-80;P.vx=0;P.vy=0;P.og=0;P.ct=0;P.jb=0;P.dd=0;P.wf=0;P.fc=1;if(f){P.sc=0;P.lv=3}}
function fR(){rP(1);rS();rE();gs="p";dt2=0;wt=0;gt=0}
function tA(px,py){const c=Math.floor(px/T),r=Math.floor(py/T);if(c<0||c>=CO||r<0||r>=RO)return 0;return mp[r][c]}
function bx(ax,ay,aw,ah,bx2,by,bw,bh){return ax<bx2+bw&&ax+aw>bx2&&ay<by+bh&&ay+ah>by}
function up(d){
if(d>.1)d=.1;gt+=d;
if(k.KeyR){fR();return}
if(gs==="d"){dt2+=d;if(dt2>1.5){if(P.lv>0){rP(0);rE();gs="p";dt2=0}else fR()}return}
if(gs==="w"){wt+=d;if(wt>3)fR();return}
if(iL())P.vx-=AC*d;else if(iR())P.vx+=AC*d;
else{const dc=P.og?2400:500;if(P.vx>0)P.vx=Math.max(0,P.vx-dc*d);else P.vx=Math.min(0,P.vx+dc*d)}
P.vx=Math.max(-MX,Math.min(MX,P.vx));
if(P.vx>10)P.fc=1;if(P.vx<-10)P.fc=-1;
if(Math.abs(P.vx)>20&&P.og)P.wf+=d*Math.abs(P.vx)/100;
P.vy+=G*d;
if(P.og)P.ct=.1;else P.ct=Math.max(0,P.ct-d);
const jp=iJ();
if(jp&&!P.wj)P.jb=.12;else P.jb=Math.max(0,P.jb-d);
P.wj=jp;
if(P.jb>0&&P.ct>0){P.vy=JV;P.jb=0;P.ct=0}
if(!jp&&P.vy<0)P.vy*=.91;
P.x+=P.vx*d;
for(let i=0;i<3;i++){const cy=P.y+4+i*(P.h-8)/2;if(P.vx>0&&tA(P.x+P.w,cy)){P.x=Math.floor((P.x+P.w)/T)*T-P.w;P.vx=0}if(P.vx<0&&tA(P.x,cy)){P.x=Math.floor(P.x/T)*T+T;P.vx=0}}
P.y+=P.vy*d;P.og=0;
if(P.vy>0){for(let i=0;i<2;i++){const cx=P.x+4+i*(P.w-8);if(tA(cx,P.y+P.h)){P.y=Math.floor((P.y+P.h)/T)*T-P.h;P.vy=0;P.og=1}}}
if(P.vy<0){for(let i=0;i<2;i++){const cx=P.x+4+i*(P.w-8);if(tA(cx,P.y)){P.y=Math.floor(P.y/T)*T+T;P.vy=0}}}
if(P.x<0){P.x=0;P.vx=0}if(P.x+P.w>WW){P.x=WW-P.w;P.vx=0}
if(P.y>H+200){P.lv--;P.dd=1;gs="d";dt2=0;return}
st.forEach(s=>{if(s.a&&bx(P.x,P.y,P.w,P.h,s.x-12,s.y-12,24,24)){s.a=0;P.sc+=100}});
en.forEach(e=>{if(!e.a)return;e.x+=e.d*65*d;if(e.x>e.sx+e.rn)e.d=-1;if(e.x<e.sx-e.rn)e.d=1;e.f+=d*4;
if(bx(P.x+3,P.y+3,P.w-6,P.h-6,e.x,e.y,e.w,e.h)){if(P.vy>0&&P.y+P.h-6<e.y+e.h/2){e.a=0;P.vy=JV*.6;P.sc+=200}else{P.lv--;P.dd=1;gs="d";dt2=0}}});
if(bx(P.x,P.y,P.w,P.h,pt.x+8,pt.y+8,40,84)){gs="w";wt=0}
}
function dr(){
q.clearRect(0,0,W,H);
const tg=P.x-W/2+P.w/2;cm+=(tg-cm)*.1;cm=Math.max(0,Math.min(WW-W,cm));
const gd=q.createLinearGradient(0,0,0,H);gd.addColorStop(0,"#1b1040");gd.addColorStop(1,"#3a1878");q.fillStyle=gd;q.fillRect(0,0,W,H);
q.fillStyle="rgba(255,255,255,.4)";for(let i=0;i<60;i++){const sx=((i*137+42)%1200)-(cm*.05)%1200;q.beginPath();q.arc(sx<0?sx+1200:sx,(i*73+19)%260,i%3?0.7:1.3,0,6.28);q.fill()}
q.fillStyle="rgba(40,20,80,.4)";q.beginPath();q.moveTo(0,H);for(let i=0;i<=W;i+=5){const wx=i+cm*.12;q.lineTo(i,H-160-Math.sin(wx*.006)*50)}q.lineTo(W,H);q.fill();
q.save();q.translate(-cm,0);
const sc2=Math.max(0,Math.floor(cm/T)-1),ec=Math.min(CO,Math.ceil((cm+W)/T)+1);
for(let r=0;r<RO;r++)for(let c=sc2;c<ec;c++){const v2=mp[r][c];if(!v2)continue;const tx=c*T,ty=r*T;if(v2===1){q.fillStyle="#5a3a1e";q.fillRect(tx,ty,T,T);q.fillStyle="#42c867";q.fillRect(tx,ty,T,12)}else{q.fillStyle="#43b2d8";q.fillRect(tx,ty,T,24);q.fillStyle="#2a6a8a";q.fillRect(tx,ty+20,T,4)}}
st.forEach(s=>{if(!s.a)return;const by=Math.sin(gt*3+s.b)*4;q.fillStyle="#ffd84d";q.beginPath();for(let i=0;i<5;i++){const a=-1.57+i*1.257,a2=a+.628;q.lineTo(s.x+Math.cos(a)*10,s.y+by+Math.sin(a)*10);q.lineTo(s.x+Math.cos(a2)*4,s.y+by+Math.sin(a2)*4)}q.closePath();q.fill()});
en.forEach(e=>{if(!e.a)return;const by=Math.sin(e.f*2)*3;q.fillStyle="#65db86";q.beginPath();q.moveTo(e.x+4,e.y+by+e.h);q.quadraticCurveTo(e.x-2,e.y+by+4,e.x+e.w/2,e.y+by);q.quadraticCurveTo(e.x+e.w+2,e.y+by+4,e.x+e.w-4,e.y+by+e.h);q.closePath();q.fill();q.fillStyle="#000";q.beginPath();q.arc(e.x+13,e.y+by+e.h*.55,2.5,0,6.28);q.fill();q.beginPath();q.arc(e.x+31,e.y+by+e.h*.55,2.5,0,6.28);q.fill()});
q.save();q.globalAlpha=.15;q.fillStyle="#5df1ff";q.beginPath();q.ellipse(pt.x+28,pt.y+50,24,42,0,0,6.28);q.fill();q.globalAlpha=.8;q.strokeStyle="#38f7ff";q.lineWidth=6;q.beginPath();q.ellipse(pt.x+28,pt.y+50,22,38,0,0,6.28);q.stroke();q.strokeStyle="#b466ff";q.lineWidth=4;q.beginPath();q.ellipse(pt.x+28,pt.y+50,13,28,gt*.8,0,6.28);q.stroke();q.restore();
if(gs!=="d"){const px=P.x,py=P.y;q.save();if(P.fc<0){q.translate(px+P.w,0);q.scale(-1,1);q.translate(-px,0)}
const ls=P.og?Math.sin(P.wf*6)*3:1;q.strokeStyle="#555";q.lineWidth=6;q.lineCap="round";q.beginPath();q.moveTo(px+10,py+34);q.lineTo(px+8-ls,py+48);q.stroke();q.beginPath();q.moveTo(px+22,py+34);q.lineTo(px+24+ls,py+48);q.stroke();
q.fillStyle="#111";q.fillRect(px+4,py+14,24,24);
q.fillStyle="#ff3755";q.beginPath();q.moveTo(px+16,py+20);q.lineTo(px+22,py+30);q.lineTo(px+16,py+27);q.lineTo(px+10,py+30);q.closePath();q.fill();
q.fillStyle="#f3c29a";q.beginPath();q.ellipse(px+16,py+4,12,11,0,0,6.28);q.fill();
q.fillStyle="#211624";q.beginPath();q.moveTo(px+3,py+1);q.bezierCurveTo(px+9,py-12,px+26,py-11,px+30,py+1);q.bezierCurveTo(px+22,py-3,px+16,py+4,px+7,py-1);q.closePath();q.fill();
q.fillStyle="#241318";q.beginPath();q.arc(px+11,py+5,2,0,6.28);q.fill();q.beginPath();q.arc(px+21,py+5,2,0,6.28);q.fill();
q.restore()}
q.restore();
q.save();q.font="bold 16px system-ui";q.fillStyle="#ffd84d";q.shadowColor="rgba(0,0,0,.5)";q.shadowBlur=4;
q.fillText("\u2605 "+P.sc,12,26);q.fillStyle="#ff8899";q.fillText("\u2665".repeat(Math.max(0,P.lv)),12,46);
q.textAlign="right";q.fillStyle="#9df5ff";q.fillText("Stars: "+(SD.length-st.filter(s=>s.a).length)+"/"+SD.length,W-12,26);q.restore();
if(gs==="d"){q.fillStyle="rgba(0,0,0,.5)";q.fillRect(0,0,W,H);q.fillStyle="#ff4466";q.font="bold 44px system-ui";q.textAlign="center";q.fillText(P.lv>0?"Oops!":"Game Over",W/2,H/2-8);q.font="18px system-ui";q.fillStyle="#ddd";q.fillText(P.lv>0?"Respawning...":"Restarting...",W/2,H/2+26)}
if(gs==="w"){q.fillStyle="rgba(0,0,0,.5)";q.fillRect(0,0,W,H);q.fillStyle="#38f7ff";q.font="bold 48px system-ui";q.textAlign="center";q.fillText("Level Complete!",W/2,H/2-16);q.font="20px system-ui";q.fillStyle="#ffd84d";q.fillText("Score: "+P.sc,W/2,H/2+20)}}
let lt=0;
function lp(ts){const d=lt?(ts-lt)/1000:1/60;lt=ts;up(d);dr();requestAnimationFrame(lp)}
fR();requestAnimationFrame(lp);
})();
</script>
</body>
</html>
